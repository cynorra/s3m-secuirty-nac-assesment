services:
  # PostgreSQL
  postgres:
    image: postgres:18-alpine
    container_name: nac-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - nac-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:8-alpine
    container_name: nac-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nac-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: nac-api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nac-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FreeRADIUS
  freeradius:
    build: ./freeradius
    container_name: nac-freeradius
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - nac-network
    healthcheck:
      test: ["CMD-SHELL", "echo 'Message-Authenticator = 0x00' | radclient -t 3 127.0.0.1:1812 status testing123 || exit 0"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

networks:
  nac-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  redis_data:
